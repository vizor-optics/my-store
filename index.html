<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر فيزور للبصريات</title>
    <style>
        /* التنسيق العام بالألوان المفضلة */
        body {
            background-color: #f5f5dc; /* بيج ناعم */
            color: #4b0082; /* نصوص بنفسجية غامقة للوضوح */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        header {
            background-color: #ffc0cb; /* وردي */
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        h1 { margin: 0; font-size: 2.5rem; }

        /* حاوية عرض المنتجات */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 10px;
        }

        /* كارت المنتج الاحترافي */
        .product-card {
            background-color: white;
            border: 2px solid #e6e6fa; /* بنفسجي فاتح جداً للحدود */
            border-radius: 20px;
            padding: 15px;
            transition: transform 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: #ffc0cb; /* يتحول للوردي عند التمرير */
        }

        .product-image {
            width: 100%;
            height: 180px;
            background-color: #fdfdff;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 15px;
        }

        .price {
            font-weight: bold;
            color: #d02090; /* وردي غامق للسعر */
            font-size: 1.2rem;
        }

        button {
            background-color: #4b0082;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }

        button:hover { background-color: #ffc0cb; color: #4b0082; }
    </style>
</head>
<body>

    <header>
        <h1>V I Z O R</h1>
        <p>مشروع تخرج الطالبة: سهاد غسان</p>
    </header>

    <div class="products-grid">
        <!-- منتج 1 -->
        <div class="product-card">
            <div class="product-image">صورة نظارة طبية</div>
            <h3>نظارة طبية كلاسيك</h3>
            <p class="price">150 ريال</p>
            <button>إضافة للسلة</button>
        </div>

        <!-- منتج 2 -->
        <div class="product-card">
            <div class="product-image">صورة نظارة شمسية</div>
            <h3>نظارة شمسية عصرية</h3>
            <p class="price">200 ريال</p>
            <button>إضافة للسلة</button>
        </div>

        <!-- منتج 3 -->
        <div class="product-card">
            <div class="product-image">صورة عدسات لاصقة</div>
            <h3>عدسات ملونة احترافية</h3>
            <p class="price">120 ريال</p>
            <button>إضافة للسلة</button>
        </div>
    </div>

</body>
</html>
