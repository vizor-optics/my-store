<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizor Optics | فيزور للبصريات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@300;600&family=Monsieur+La+Doulaise&family=Reem+Kufi:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-mauve: #9b5b7c; 
            --accent-pink: #d4a5b9;
            --light-burgundy: #7a445a; 
            --bg-soft: #f4eef0; 
            --dark-berry: #2d0f19;
            --gold-light: #ecd399;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background-color: #000;
            color: #ffffff;
            scroll-behavior: smooth;
        }

        .hero-section {
            position: relative;
            min-height: 100vh;
            width: 100%;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.4)), 
                        url('mmmm.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .main-container {
            background: rgba(45, 15, 25, 0.7); 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 30px;
            text-align: center;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .brand-logo {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.2rem, 7vw, 3.2rem);
            background: linear-gradient(135deg, #fff 0%, var(--accent-pink) 50%, var(--gold-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            letter-spacing: 8px;
        }

        .tagline {
            font-family: 'Aref Ruqaa', serif;
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: var(--accent-pink);
        }

        .categories-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }

        .category-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(212, 165, 185, 0.2);
            border-radius: 15px;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .video-container {
            width: 85%; 
            height: 140px; 
            margin: 15px auto;
            border-radius: 15px;
            overflow: hidden;
            border: 1.5px solid var(--light-burgundy);
        }

        .promo-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .btn-shop {
            padding: 8px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            border: none;
            background: var(--accent-pink);
            color: var(--dark-berry);
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-shop:hover {
            background: var(--gold-light);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(45, 15, 25, 0.95);
            justify-content: center; 
            align-items: flex-start;
            overflow-y: auto;
            padding: 40px 0;
        }

        .modal-content {
            background: var(--bg-soft);
            padding: 25px;
            border-radius: 30px;
            text-align: center;
            max-width: 90%;
            width: 1000px;
            margin: auto;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .product-item {
            background: #fff;
            border-radius: 20px;
            padding: 12px;
            border: 2px solid var(--light-burgundy);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .product-item img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 10px;
        }

        .price-tag {
            color: var(--light-burgundy);
            font-weight: 800;
            display: block;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .info-footer {
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }

        /* توقيع Suhad بالإنجليزية بخط الرقعة */
        .signature {
            font-family: 'Aref Ruqaa', serif;
            font-size: 1.1rem;
            color: var(--gold-light);
            font-weight: 400;
            display: inline-block;
            margin-right: 4px;
        }

        .close-btn {
            background: var(--dark-berry);
            color: #fff;
            border: 1px solid var(--gold-light);
            padding: 10px 40px;
            cursor: pointer;
            border-radius: 12px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="main-container">
            <h1 class="brand-logo">VIZOR</h1>
            <p class="tagline">جمال الرؤية في تفاصيل الأناقة</p>

            <div class="categories-grid">
                <div class="category-card">
                    <h3>القسم النسائي</h3>
                    <button class="btn-shop" onclick="showModels('النسائية')">تسوّق الآن</button>
                </div>
                <div class="category-card">
                    <h3>القسم الرجالي</h3>
                    <button class="btn-shop" onclick="showModels('الرجالية')">تسوّق الآن</button>
                </div>
                <div class="category-card">
                    <h3>قسم الأطفال</h3>
                    <button class="btn-shop" onclick="showModels('الأطفال')">تسوّق الآن</button>
                </div>
                <div class="category-card" id="cart-section" style="border: 1px dashed var(--gold-light); background: rgba(155, 91, 124, 0.15);">
                    <h3>🛒 سلة المشتريات</h3>
                    <button class="btn-shop" id="cart-count" onclick="alert('السلة فارغة حالياً')">عرض (0)</button>
                </div>
            </div>

            <div class="video-container">
                <video class="promo-video" controls autoplay muted loop>
                    <source src="Mp4.mp4" type="video/mp4">
                </video>
            </div>

            <div class="info-footer">
                <p style="font-size: 0.8rem; margin-bottom: 5px; opacity: 0.8;">Aden - اليمن</p>
                <p style="font-size: 0.8rem; opacity: 0.9;">Designed by: <span class="signature">Suhad</span></p>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title" style="font-family: 'Aref Ruqaa'; color: var(--dark-berry); font-size: 2.2rem;"></h2>
            <div id="products-container" class="products-grid"></div>
            <button class="close-btn" onclick="closeModal()">إغلاق المعرض</button>
        </div>
    </div>

    <script>
        let myCart = [];

        function showModels(type) {
            const modal = document.getElementById('modal');
            const title = document.getElementById('modal-title');
            const container = document.getElementById('products-container');
            
            title.innerText = "تشكيلة " + type;
            container.innerHTML = ""; 

            let prefix = (type === 'النسائية') ? "w" : (type === 'الرجالية' ? "S" : "B");

            for (let i = 1; i <= 12; i++) {
                let price = (type === 'النسائية') ? 55 : (type === 'الرجالية' ? 65 : 30);

                const productHTML = `
                    <div class="product-item">
                        <img src="${prefix}${i}.jpg" alt="${type}" onerror="this.src='https://via.placeholder.com/200x200?text=VIZOR'">
                        <span class="price-tag">${price}$</span>
                        <button class="btn-shop" style="width:100%" onclick="addToCart('${prefix}${i}')">إضافة للسلة</button>
                    </div>
                `;
                container.innerHTML += productHTML;
            }

            modal.style.display = 'flex';
        }

        function addToCart(item) {
            myCart.push(item);
            document.getElementById('cart-count').innerText = "عرض (" + myCart.length + ")";
            alert("تمت إضافة الموديل " + item + " للسلة بنجاح");
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target == modal) closeModal();
        }
    </script>
</body>
</html>
